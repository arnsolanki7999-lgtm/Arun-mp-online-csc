<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun MP Online CSC - सरकारी सेवाएं</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🏛️</span>
                    <h1>Arun MP Online CSC</h1>
                </div>
                <p class="subtitle">इंदौर - सरकारी सेवाएं गाइड 2024</p>
            </div>
            <div class="header-nav">
                <button class="nav-btn" onclick="showHome()">🏠 होम</button>
                <button class="nav-btn" onclick="showServices()">📋 सेवाएं</button>
                <button class="nav-btn" onclick="showAdmin()">📊 Admin Panel</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Home Page -->
            <section id="homePage" class="page active">
                <div class="hero">
                    <h2>आपकी सभी सरकारी सेवाएं एक जगह</h2>
                    <p>प्रमाण पत्र, लाइसेंस, पंजीकरण - सब कुछ के लिए Step-by-Step Guide</p>
                    <button class="hero-btn" onclick="showServices()">सेवाएं देखें 👉</button>
                </div>
            </section>

            <!-- Services Page -->
            <section id="servicesPage" class="page">
                <div class="search-section">
                    <input type="text" id="searchInput" class="search-box" placeholder="सेवा खोजें...">
                </div>
                <div class="services-grid" id="servicesGrid"></div>
            </section>

            <!-- Service Detail Page -->
            <section id="detailPage" class="page">
                <button class="back-btn" onclick="showServices()">← वापिस</button>
                <div class="detail-container" id="detailContent"></div>
            </section>

            <!-- Admin Panel -->
            <section id="adminPage" class="page">
                <div class="admin-container">
                    <h2>📊 Admin Dashboard</h2>
                    <div class="admin-tabs">
                        <button class="tab-btn active" onclick="showAdminTab('pending')">⏳ पेंडिंग</button>
                        <button class="tab-btn" onclick="showAdminTab('completed')">✅ पूरी हुई</button>
                        <button class="tab-btn" onclick="showAdminTab('all')">📋 सभी</button>
                    </div>
                    <div id="adminContent" class="admin-content"></div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 Arun MP Online CSC - Indore | सभी सेवाएं</p>
        </footer>
    </div>

    <!-- Service Detail Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBooking()">&times;</span>
            <h2>सेवा के लिए आवेदन करें</h2>
            <form id="bookingForm" onsubmit="submitBooking(event)">
                <input type="text" id="customerName" placeholder="आपका नाम" required>
                <input type="tel" id="customerPhone" placeholder="फोन नंबर (WhatsApp)" required>
                <input type="email" id="customerEmail" placeholder="ईमेल (Optional)">
                <textarea id="customerNotes" placeholder="कोई विशेष जानकारी..."></textarea>
                <button type="submit" class="submit-btn">आवेदन करें ✅</button>
            </form>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
