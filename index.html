<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun MP Online CSC - इंदौर सरकारी सेवाएं</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🏛️</span>
                    <h1>Arun MP Online CSC</h1>
                </div>
                <p class="subtitle">इंदौर सरकारी सेवाएं गाइड 2024</p>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalServices">40+</div>
                    <div class="stat-label">कुल सेवाएं</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="searchCount">0</div>
                    <div class="stat-label">खोज</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pageCount">1</div>
                    <div class="stat-label">पृष्ठ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="favoriteCount">0</div>
                    <div class="stat-label">पसंदीदा</div>
                </div>
            </div>
        </section>

        <!-- Search Section -->
        <section class="search-section">
            <input type="text" id="searchInput" class="search-box" placeholder="सेवा खोजें - जैसे PAN, आधार, बिजली बिल...">
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">सभी</button>
                <button class="filter-btn" data-filter="document">दस्तावेज़</button>
                <button class="filter-btn" data-filter="banking">बैंकिंग</button>
                <button class="filter-btn" data-filter="utility">यूटिलिटी</button>
                <button class="filter-btn" data-filter="government">सरकारी</button>
            </div>
        </section>

        <!-- Services Grid -->
        <section class="services-section">
            <div class="services-grid" id="servicesGrid">
                <!-- Services will be loaded here by JavaScript -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 Arun MP Online CSC - Indore | सभी सेवाएं</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
